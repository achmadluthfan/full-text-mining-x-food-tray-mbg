# Query cluster untuk xpoz getTwitterPostsByKeywords
#
# Catatan sintaks xpoz (beda dari X API v2):
#   - AND / OR / NOT wajib EKSPLISIT (spasi = OR implicit, TAPI jangan
#     diandalkan — selalu tulis operator)
#   - Tanda kutip untuk exact phrase: "food tray MBG"
#   - Parentheses untuk grouping
#   - JANGAN pakai from: / lang: / is:retweet di dalam query
#     -> pakai parameter authorUsername / language / filterOutRetweets
#
# Semua pack difilter via parameter:
#   language: "id"
#   filterOutRetweets: true

umum_tray_mbg: '("food tray MBG" OR "tray MBG" OR "wadah MBG" OR "tempat makan MBG" OR "ompreng MBG")'

isu_suhu: '(("food tray MBG" OR "tray MBG" OR "ompreng MBG" OR "wadah MBG") AND (dingin OR panas OR hangat OR suhu OR basi OR "cepat basi"))'

isu_tumpah_tutup: '(("food tray MBG" OR "tray MBG" OR "ompreng MBG" OR "wadah MBG") AND (tumpah OR bocor OR tutup OR rapat OR kuah))'

isu_material: '(("food tray MBG" OR "tray MBG" OR "ompreng MBG") AND (stainless OR "ss 304" OR "food grade" OR bahan OR karat))'

isu_distribusi: '(("food tray MBG" OR "tray MBG" OR "ompreng MBG") AND (distribusi OR angkut OR ikat OR rafia OR tumpuk OR handling))'

isu_higiene: '(("food tray MBG" OR "tray MBG" OR "ompreng MBG") AND (higienis OR sanitasi OR bersih OR kotor OR kontaminasi))'
